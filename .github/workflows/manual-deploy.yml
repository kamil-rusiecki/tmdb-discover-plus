name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm deployment'
        required: true
        default: ''
      target:
        description: 'Deployment target'
        required: true
        default: 'oracle'
        type: choice
        options:
          - oracle
          - beamup

permissions:
  contents: write

jobs:
  validate:
    name: Validate Input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "❌ Deployment cancelled. You must type 'deploy' to confirm."
          exit 1

  deploy:
    name: Deploy to ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ github.event.inputs.target == 'beamup' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        if: ${{ github.event.inputs.target == 'beamup' }}
        run: |
          npm ci
          cd server && npm ci
          cd ../client && npm ci

      - name: Build client
        if: ${{ github.event.inputs.target == 'beamup' }}
        run: cd client && npm run build

      - name: Configure Git
        if: ${{ github.event.inputs.target == 'beamup' }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Add built files to deploy commit
        if: ${{ github.event.inputs.target == 'beamup' }}
        run: |
          git add -f client/dist/
          git commit -m "Build for deployment [skip ci]" --allow-empty

      - name: Setup SSH for Oracle VM
        if: ${{ github.event.inputs.target == 'oracle' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_VM_SSH_KEY }}" > ~/.ssh/oracle_vm_key
          chmod 600 ~/.ssh/oracle_vm_key
          ssh-keyscan -H "${{ secrets.ORACLE_VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Oracle VM
        if: ${{ github.event.inputs.target == 'oracle' }}
        env:
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_VM_USER: ${{ secrets.ORACLE_VM_USER }}
        run: |
          ssh -i ~/.ssh/oracle_vm_key -o StrictHostKeyChecking=yes "$ORACLE_VM_USER@$ORACLE_VM_HOST" << 'EOF'
          set -euo pipefail

          cd ~/tmdb-discover-plus
          git fetch origin
          git reset --hard ${{ github.sha }}

          cd server
          npm ci --omit=dev

          cd ../client
          npm ci
          npm run build
          cp -r public/* dist/ 2>/dev/null || true

          cd ..
          sudo systemctl restart tmdb-nightly

          ok=0
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:7000/health > /dev/null; then
              ok=1
              break
            fi
            sleep 2
          done

          if [ "$ok" -ne 1 ]; then
            echo "Health check failed after restart"
            sudo systemctl status tmdb-nightly --no-pager || true
            sudo journalctl -u tmdb-nightly -n 120 --no-pager || true
            exit 1
          fi

          echo "Manual deploy completed on Oracle VM"
          EOF

      - name: Setup SSH for BeamUp
        if: ${{ github.event.inputs.target == 'beamup' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEAMUP_SSH_KEY }}" > ~/.ssh/beamup_key
          chmod 600 ~/.ssh/beamup_key
          ssh-keyscan -H a.baby-beamup.club >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to BeamUp
        if: ${{ github.event.inputs.target == 'beamup' }}
        env:
          GIT_SSH_COMMAND: 'ssh -i ~/.ssh/beamup_key -o StrictHostKeyChecking=no'
        run: |
          git remote add beamup dokku@a.baby-beamup.club:84f50d1c22e7-tmdb-discover-plus || true
          git push beamup HEAD:main --force

      - name: Deployment Summary
        run: |
          echo "## 🚀 Manual Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.target }}" = "oracle" ]; then
            echo "**Target:** Oracle VM" >> $GITHUB_STEP_SUMMARY
            echo "**URL:** https://tmdb-discover-plus.duckdns.org/" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Target:** BeamUp" >> $GITHUB_STEP_SUMMARY
            echo "**URL:** http://84f50d1c22e7-tmdb-discover-plus.baby-beamup.club/" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
